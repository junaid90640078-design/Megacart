<!DOCTYPE html>
<html lang="en">

<head>
  <title>Login Page</title>

<style>

body{
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  background:#f1f3f6;
}

.login-box{
  background:white;
  padding:40px;
  border-radius:10px;
  width:300px;
  text-align:center;
}

input{
  width:100%;
  padding:10px;
  margin-top:15px;
}

button{
  width:100%;
  padding:10px;
  margin-top:20px;
  background:#2874f0;
  color:white;
  border:none;
}

</style>

</head>

<body>

<div class="login-box">

<h1>Login</h1>

<input type="email" placeholder="Enter Email">

<input type="password" placeholder="Password">

<button>Login</button>

</div>

</body>
</html>
